<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Timeline</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="">
  <style>
    html, body { height: 100%; margin: 0; }
    #map { height: 100%; width: 100%; }
    #controls {
      position: absolute; top: 10px; left: 60px; z-index: 1000;
      background: white; padding: 8px 10px; border-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
      font: 13px system-ui, sans-serif;
    }
    #controls label { margin-right: 6px; }
    #controls input { margin-right: 10px; }
    #controls button.nav { font-size: 14px; padding: 2px 8px; margin-right: 6px; cursor: pointer; }
    #status { margin-left: 8px; color: #555; }
  </style>
</head>
<body>
  <div id="controls">
    <button id="prevDay" class="nav" title="Previous day">&#9664;</button>
    <label>From <input type="datetime-local" id="from"></label>
    <label>To <input type="datetime-local" id="to"></label>
    <button id="nextDay" class="nav" title="Next day">&#9654;</button>
    <button id="load">Load</button>
    <span id="status"></span>
  </div>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin=""></script>
  <script>
    const map = L.map('map').setView([0, 0], 2);
    const streets = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);
    const imagery = L.tileLayer(
      'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
      {
        maxZoom: 19,
        attribution: 'Tiles &copy; Esri &mdash; Source: Esri, Maxar, Earthstar Geographics, and the GIS User Community'
      }
    );
    L.control.layers({ Streets: streets, Imagery: imagery }, null, { position: 'topright' }).addTo(map);

    let layer = L.layerGroup().addTo(map);
    const statusEl = document.getElementById('status');

    function etOffsetForDate(dateStr) {
      const [y, m, d] = dateStr.split('-').map(Number);
      const noonUtc = new Date(Date.UTC(y, m - 1, d, 12));
      const parts = new Intl.DateTimeFormat('en-US', {
        timeZone: 'America/New_York',
        timeZoneName: 'longOffset',
      }).formatToParts(noonUtc);
      const tzn = parts.find(p => p.type === 'timeZoneName').value;
      return tzn.replace('GMT', '') || '+00:00';
    }

    function toEpoch(value) {
      if (!value) return null;
      const dateStr = value.slice(0, 10);
      const d = new Date(`${value}:00${etOffsetForDate(dateStr)}`);
      return isNaN(d) ? null : Math.floor(d.getTime() / 1000);
    }

    function todayInET() {
      const parts = new Intl.DateTimeFormat('en-CA', {
        timeZone: 'America/New_York',
        year: 'numeric', month: '2-digit', day: '2-digit',
      }).formatToParts(new Date());
      const get = t => parts.find(p => p.type === t).value;
      return `${get('year')}-${get('month')}-${get('day')}`;
    }

    function shiftDate(dateStr, days) {
      const [y, m, d] = dateStr.split('-').map(Number);
      const dt = new Date(Date.UTC(y, m - 1, d));
      dt.setUTCDate(dt.getUTCDate() + days);
      const yy = dt.getUTCFullYear();
      const mm = String(dt.getUTCMonth() + 1).padStart(2, '0');
      const dd = String(dt.getUTCDate()).padStart(2, '0');
      return `${yy}-${mm}-${dd}`;
    }

    function shiftPickers(days) {
      for (const id of ['from', 'to']) {
        const el = document.getElementById(id);
        if (!el.value) continue;
        const [datePart, timePart] = el.value.split('T');
        el.value = `${shiftDate(datePart, days)}T${timePart}`;
      }
    }

    async function load() {
      const params = new URLSearchParams();
      const f = toEpoch(document.getElementById('from').value);
      const t = toEpoch(document.getElementById('to').value);
      if (f !== null) params.set('from', f);
      if (t !== null) params.set('to', t);

      statusEl.textContent = 'Loading…';
      const res = await fetch('/api/points?' + params.toString());
      if (!res.ok) {
        statusEl.textContent = 'Error: ' + res.status;
        return;
      }
      const geo = await res.json();

      layer.clearLayers();
      const coords = geo.features.map(f => {
        const [lon, lat] = f.geometry.coordinates;
        return [lat, lon];
      });

      if (coords.length === 0) {
        statusEl.textContent = 'No points';
        return;
      }

      L.polyline(coords, { color: 'steelblue', weight: 3 }).addTo(layer);
      const tsFmt = new Intl.DateTimeFormat('en-US', {
        timeZone: 'America/New_York',
        year: 'numeric', month: 'short', day: '2-digit',
        hour: '2-digit', minute: '2-digit', second: '2-digit',
        timeZoneName: 'short',
      });
      geo.features.forEach(f => {
        const [lon, lat] = f.geometry.coordinates;
        const p = f.properties;
        const ts = tsFmt.format(new Date(p.tst * 1000));
        const accFt = p.acc == null ? '?' : Math.round(p.acc * 3.28084);
        const velMph = p.vel == null ? '?' : Math.round(p.vel * 0.621371);
        L.circleMarker([lat, lon], { radius: 4, color: 'steelblue' })
         .bindPopup(`${ts}<br>acc: ${accFt} ft<br>vel: ${velMph} mph`)
         .addTo(layer);
      });

      map.fitBounds(L.latLngBounds(coords), { padding: [20, 20] });
      statusEl.textContent = `${coords.length} points`;
    }

    document.getElementById('load').addEventListener('click', load);
    document.getElementById('prevDay').addEventListener('click', () => { shiftPickers(-1); load(); });
    document.getElementById('nextDay').addEventListener('click', () => { shiftPickers(1); load(); });

    const today = todayInET();
    document.getElementById('from').value = `${today}T00:00`;
    document.getElementById('to').value = `${today}T23:59`;
    load();
  </script>
</body>
</html>
