<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Timeline</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="">
  <style>
    html, body { height: 100%; margin: 0; }
    #map { height: 100%; width: 100%; }
    #controls {
      position: absolute; top: 10px; left: 60px; z-index: 1000;
      background: white; border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
      font: 14px system-ui, sans-serif;
      max-width: calc(100vw - 120px);
      box-sizing: border-box;
    }
    #modeTabs { display: flex; padding: 4px; gap: 2px; border-bottom: 1px solid #eee; }
    #modeTabs button {
      flex: 1; border: none; background: transparent; cursor: pointer;
      padding: 6px 12px; border-radius: 4px; font: inherit; color: #555;
    }
    #modeTabs button:hover { background: #f0f0f0; }
    #modeTabs button.active { background: steelblue; color: white; }
    #modeTabs button.active:hover { background: steelblue; }
    #liveBar { display: none; align-items: center; padding: 8px 12px; gap: 8px; }
    #liveBar #liveCount { flex: 1; font-weight: 500; white-space: nowrap; }
    #liveBar button {
      border: none; background: transparent; cursor: pointer;
      font-size: 16px; padding: 4px 8px; color: #333; border-radius: 6px;
    }
    #liveBar button:hover { background: #f0f0f0; }
    #controls.live #dayBar,
    #controls.live #customRange { display: none; }
    #controls.live #liveBar { display: flex; }
    #dayBar { display: flex; align-items: center; }
    #dayBar button {
      border: none; background: transparent; cursor: pointer;
      font-size: 14px; padding: 8px 10px; color: #333; line-height: 1;
      border-radius: 6px;
    }
    #dayBar button:hover { background: #f0f0f0; }
    #dayBar button:disabled { color: #ccc; cursor: default; background: transparent; }
    #dateGroup {
      flex: 1; display: flex; align-items: center; justify-content: center;
      min-width: 175px;
    }
    #dayLabel {
      font-weight: 500; padding: 8px 0 8px 4px; user-select: none;
      white-space: nowrap; cursor: pointer;
    }
    #dayLabel:hover { color: #000; }
    #toggleCustom { padding: 8px 6px; }
    #toggleCustom .chev {
      display: inline-block; transition: transform 0.15s;
      font-size: 16px; line-height: 1;
    }
    #controls.custom-open #toggleCustom .chev { transform: rotate(180deg); }
    #customRange { display: none; padding: 8px 12px 10px; border-top: 1px solid #eee; }
    #controls.custom-open #customRange { display: block; }
    #customRange label { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    #customRange label span { width: 38px; color: #555; font-size: 13px; }
    #customRange input {
      flex: 1; min-width: 0; padding: 4px 6px;
      font: inherit; box-sizing: border-box;
    }
    #customRange .actions { display: flex; gap: 8px; margin-top: 8px; justify-content: flex-end; }
    #customRange .actions button {
      border: 1px solid #ccc; background: white; padding: 4px 12px;
      border-radius: 4px; cursor: pointer; font: inherit;
    }
    #customRange .actions button.primary {
      background: steelblue; color: white; border-color: steelblue;
    }
    #status { padding: 4px 12px 8px; color: #555; font-size: 12px; }
    #status:empty { display: none; }
    .spurious-toggle {
      margin-top: 6px; padding: 3px 8px; border: 1px solid #ccc;
      background: white; border-radius: 4px; cursor: pointer; font: inherit;
      font-size: 12px;
    }
    .spurious-toggle:hover { background: #f0f0f0; }
    .spurious-radius {
      margin-top: 6px; padding: 3px 8px; border: 1px solid #ccc;
      background: white; border-radius: 4px; cursor: pointer; font: inherit;
      font-size: 12px;
    }
    .spurious-radius:hover { background: #f0f0f0; }
    .spurious-radius:disabled { color: #999; cursor: default; }
    @media (max-width: 480px) {
      #controls { left: 50px; max-width: calc(100vw - 100px); }
      #dateGroup { min-width: 150px; }
      #dayLabel { font-size: 13px; }
      #toggleCustom .chev { font-size: 20px; }
    }
  </style>
</head>
<body>
  <div id="controls">
    <div id="modeTabs">
      <button id="tabHistory" type="button">History</button>
      <button id="tabLive" type="button">Live</button>
    </div>
    <div id="liveBar">
      <span id="liveCount">No phones</span>
      <button id="refreshLive" title="Refresh" aria-label="Refresh">&#x21bb;</button>
    </div>
    <div id="dayBar">
      <button id="prevDay" title="Previous day" aria-label="Previous day">&#9664;</button>
      <div id="dateGroup">
        <span id="dayLabel">Today</span>
        <button id="toggleCustom" title="Custom range" aria-label="Toggle custom range" aria-expanded="false">
          <span class="chev">&#9660;</span>
        </button>
      </div>
      <button id="nextDay" title="Next day" aria-label="Next day">&#9654;</button>
    </div>
    <div id="customRange">
      <label><span>From</span><input type="datetime-local" id="from"></label>
      <label><span>To</span><input type="datetime-local" id="to"></label>
      <div class="actions">
        <button id="applyCustom" class="primary">Apply</button>
      </div>
    </div>
    <div id="status"></div>
  </div>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin=""></script>
  <script src="https://unpkg.com/tz-lookup@6.1.25/tz.js"></script>
  <script>
    const map = L.map('map').setView([0, 0], 2);
    const streets = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);
    const imagery = L.tileLayer(
      'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
      {
        maxZoom: 19,
        attribution: 'Tiles &copy; Esri &mdash; Source: Esri, Maxar, Earthstar Geographics, and the GIS User Community'
      }
    );
    L.control.layers({ Streets: streets, Imagery: imagery }, null, { position: 'topright' }).addTo(map);

    let layer = L.layerGroup().addTo(map);
    const statusEl = document.getElementById('status');
    const controlsEl = document.getElementById('controls');
    const dayLabelEl = document.getElementById('dayLabel');
    const prevBtn = document.getElementById('prevDay');
    const nextBtn = document.getElementById('nextDay');
    const toggleBtn = document.getElementById('toggleCustom');
    const fromEl = document.getElementById('from');
    const toEl = document.getElementById('to');
    const tabHistoryBtn = document.getElementById('tabHistory');
    const tabLiveBtn = document.getElementById('tabLive');
    const liveCountEl = document.getElementById('liveCount');
    const refreshLiveBtn = document.getElementById('refreshLive');

    L.DomEvent.disableClickPropagation(controlsEl);
    L.DomEvent.disableScrollPropagation(controlsEl);

    let viewMode = 'history';  // 'history' | 'live'
    let mode = 'day';          // 'day' | 'custom'  (only meaningful when viewMode === 'history')
    let currentDay;            // YYYY-MM-DD (Eastern time) when mode === 'day'

    function formatTsAt(tst, lat, lon) {
      let zone;
      try {
        zone = tzlookup(lat, lon);
      } catch (e) {
        zone = 'UTC';
      }
      return new Intl.DateTimeFormat('en-US', {
        timeZone: zone,
        year: 'numeric', month: 'short', day: '2-digit',
        hour: '2-digit', minute: '2-digit', second: '2-digit',
        timeZoneName: 'short',
      }).format(new Date(tst * 1000));
    }

    function colorForTid(tid) {
      let h = 0;
      for (const c of tid || '?') h = (h * 31 + c.charCodeAt(0)) >>> 0;
      return `hsl(${h % 360}, 70%, 42%)`;
    }

    function etOffsetForDate(dateStr) {
      const [y, m, d] = dateStr.split('-').map(Number);
      const noonUtc = new Date(Date.UTC(y, m - 1, d, 12));
      const parts = new Intl.DateTimeFormat('en-US', {
        timeZone: 'America/New_York',
        timeZoneName: 'longOffset',
      }).formatToParts(noonUtc);
      const tzn = parts.find(p => p.type === 'timeZoneName').value;
      return tzn.replace('GMT', '') || '+00:00';
    }

    function todayInET() {
      const parts = new Intl.DateTimeFormat('en-CA', {
        timeZone: 'America/New_York',
        year: 'numeric', month: '2-digit', day: '2-digit',
      }).formatToParts(new Date());
      const get = t => parts.find(p => p.type === t).value;
      return `${get('year')}-${get('month')}-${get('day')}`;
    }

    function shiftDate(dateStr, days) {
      const [y, m, d] = dateStr.split('-').map(Number);
      const dt = new Date(Date.UTC(y, m - 1, d));
      dt.setUTCDate(dt.getUTCDate() + days);
      const yy = dt.getUTCFullYear();
      const mm = String(dt.getUTCMonth() + 1).padStart(2, '0');
      const dd = String(dt.getUTCDate()).padStart(2, '0');
      return `${yy}-${mm}-${dd}`;
    }

    function dayLabelText(dateStr) {
      const today = todayInET();
      if (dateStr === today) return 'Today';
      if (dateStr === shiftDate(today, -1)) return 'Yesterday';
      const [y, m, d] = dateStr.split('-').map(Number);
      const dt = new Date(Date.UTC(y, m - 1, d, 12));
      return new Intl.DateTimeFormat('en-US', {
        timeZone: 'America/New_York',
        weekday: 'long', month: 'short', day: 'numeric',
      }).format(dt);
    }

    function dayBoundsEpoch(dateStr) {
      const offset = etOffsetForDate(dateStr);
      const start = new Date(`${dateStr}T00:00:00${offset}`);
      const end = new Date(`${dateStr}T23:59:59${offset}`);
      return [Math.floor(start.getTime() / 1000), Math.floor(end.getTime() / 1000)];
    }

    function toEpoch(value) {
      if (!value) return null;
      const dateStr = value.slice(0, 10);
      const d = new Date(`${value}:00${etOffsetForDate(dateStr)}`);
      return isNaN(d) ? null : Math.floor(d.getTime() / 1000);
    }

    function setDay(dateStr) {
      mode = 'day';
      currentDay = dateStr;
      dayLabelEl.textContent = dayLabelText(dateStr);
      prevBtn.disabled = false;
      nextBtn.disabled = false;
      controlsEl.classList.remove('custom-open');
      toggleBtn.setAttribute('aria-expanded', 'false');
    }

    function setCustom() {
      mode = 'custom';
      dayLabelEl.textContent = 'Custom range';
      prevBtn.disabled = true;
      nextBtn.disabled = true;
      controlsEl.classList.add('custom-open');
      toggleBtn.setAttribute('aria-expanded', 'true');
    }

    let pendingReload = null;
    function scheduleReload() {
      if (pendingReload !== null) clearTimeout(pendingReload);
      pendingReload = setTimeout(() => {
        pendingReload = null;
        load({ fit: false });
      }, 1500);
    }

    function renderHistoryGroup(lat, lon, group, tid, color, spuriousColor) {
      const recolor = () => {
        const allSpurious = group.every(({ p }) => p.spurious);
        marker.setStyle({ color: allSpurious ? spuriousColor : color });
      };
      const marker = L.circleMarker([lat, lon], { radius: 4 }).addTo(layer);
      const buildPopup = () => {
        const div = document.createElement('div');
        const header = document.createElement('div');
        const countLabel = group.length > 1 ? ` (${group.length} points)` : '';
        header.innerHTML = `<b>${tid}</b>${countLabel}`;
        div.appendChild(header);

        const radiusBtn = document.createElement('button');
        radiusBtn.className = 'spurious-radius';
        radiusBtn.textContent = 'Mark all within 5m as spurious';
        radiusBtn.addEventListener('click', async () => {
          radiusBtn.disabled = true;
          const res = await fetch('/api/points/spurious_radius', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ lat, lon, tid, radius_m: 5, spurious: true }),
          });
          if (!res.ok) {
            radiusBtn.disabled = false;
            statusEl.textContent = 'Error: ' + res.status;
            return;
          }
          const data = await res.json();
          statusEl.textContent = `Marked ${data.count} point${data.count === 1 ? '' : 's'} as spurious`;
          marker.closePopup();
          load({ fit: false });
        });
        div.appendChild(radiusBtn);

        group.forEach(({ p }) => {
          const ts = formatTsAt(p.tst, lat, lon);
          const accFt = p.acc == null ? '?' : Math.round(p.acc * 3.28084);
          const velMph = p.vel == null ? '?' : Math.round(p.vel * 0.621371);
          const row = document.createElement('div');
          row.style.borderTop = '1px solid #eee';
          row.style.padding = '6px 0';
          const label = p.spurious
            ? ` <span style="color:${spuriousColor}">(spurious)</span>`
            : '';
          row.innerHTML = `${ts}${label}<br>acc: ${accFt} ft, vel: ${velMph} mph`;
          const btn = document.createElement('button');
          btn.className = 'spurious-toggle';
          btn.textContent = p.spurious ? 'Unmark spurious' : 'Mark as spurious';
          btn.addEventListener('click', async () => {
            btn.disabled = true;
            const next = !p.spurious;
            const res = await fetch(`/api/points/${p.id}/spurious`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ spurious: next }),
            });
            if (!res.ok) {
              btn.disabled = false;
              statusEl.textContent = 'Error: ' + res.status;
              return;
            }
            p.spurious = next;
            recolor();
            marker.setPopupContent(buildPopup());
            // Polyline needs a reload to redraw without/with this point;
            // debounce so the user can mark several stacked points first.
            scheduleReload();
          });
          row.appendChild(document.createElement('br'));
          row.appendChild(btn);
          div.appendChild(row);
        });
        return div;
      };
      marker.bindPopup(buildPopup);
      recolor();
    }

    function coordKey(lat, lon) {
      // Group points within ~1m: 5 decimals of lat/lon.
      return `${lat.toFixed(5)},${lon.toFixed(5)}`;
    }

    async function loadHistory({ fit = true } = {}) {
      const params = new URLSearchParams();
      let f, t;
      if (mode === 'day') {
        [f, t] = dayBoundsEpoch(currentDay);
      } else {
        f = toEpoch(fromEl.value);
        t = toEpoch(toEl.value);
      }
      if (f !== null) params.set('from', f);
      if (t !== null) params.set('to', t);

      if (fit) statusEl.textContent = 'Loading…';
      const res = await fetch('/api/points?' + params.toString());
      if (!res.ok) {
        statusEl.textContent = 'Error: ' + res.status;
        return;
      }
      const geo = await res.json();

      layer.clearLayers();

      if (geo.features.length === 0) {
        statusEl.textContent = 'No points';
        return;
      }

      const byTid = new Map();
      const allCoords = [];
      geo.features.forEach(f => {
        const [lon, lat] = f.geometry.coordinates;
        const tid = f.properties.tid || '?';
        if (!byTid.has(tid)) byTid.set(tid, []);
        byTid.get(tid).push({ lat, lon, p: f.properties });
        allCoords.push([lat, lon]);
      });

      const SPURIOUS_COLOR = '#888';
      byTid.forEach((points, tid) => {
        const color = colorForTid(tid);
        const lineCoords = points
          .filter(({ p }) => !p.spurious)
          .map(({ lat, lon }) => [lat, lon]);
        if (lineCoords.length > 1) {
          L.polyline(lineCoords, { color, weight: 3 }).addTo(layer);
        }
        const groups = new Map();
        points.forEach(pt => {
          const key = coordKey(pt.lat, pt.lon);
          if (!groups.has(key)) groups.set(key, []);
          groups.get(key).push(pt);
        });
        groups.forEach(group => {
          const { lat, lon } = group[0];
          renderHistoryGroup(lat, lon, group, tid, color, SPURIOUS_COLOR);
        });
      });

      if (fit) map.fitBounds(L.latLngBounds(allCoords), { padding: [20, 20] });
      statusEl.textContent = `${allCoords.length} points`;
    }

    async function loadLive({ fit = true } = {}) {
      if (fit) statusEl.textContent = 'Loading…';
      const res = await fetch('/api/latest');
      if (!res.ok) {
        statusEl.textContent = 'Error: ' + res.status;
        return;
      }
      const geo = await res.json();

      layer.clearLayers();
      const n = geo.features.length;
      liveCountEl.textContent = n === 0 ? 'No phones' : `${n} phone${n === 1 ? '' : 's'}`;
      if (n === 0) {
        statusEl.textContent = '';
        return;
      }

      const coords = [];
      geo.features.forEach(f => {
        const [lon, lat] = f.geometry.coordinates;
        const p = f.properties;
        const tid = p.tid || '?';
        const color = colorForTid(tid);
        const ts = formatTsAt(p.tst, lat, lon);
        const accFt = p.acc == null ? '?' : Math.round(p.acc * 3.28084);
        const battStr = p.batt == null ? '?' : `${p.batt}%`;
        L.circleMarker([lat, lon], {
          radius: 8, color, fillColor: color, fillOpacity: 0.85, weight: 2,
        })
         .bindTooltip(tid, { permanent: true, direction: 'right', offset: [8, 0], className: 'tid-label' })
         .bindPopup(`<b>${tid}</b><br>${ts}<br>acc: ${accFt} ft<br>batt: ${battStr}`)
         .addTo(layer);
        coords.push([lat, lon]);
      });

      if (fit) {
        if (coords.length === 1) {
          map.setView(coords[0], Math.max(map.getZoom(), 13));
        } else {
          map.fitBounds(L.latLngBounds(coords), { padding: [40, 40] });
        }
      }
      statusEl.textContent = '';
    }

    function load(opts) {
      return viewMode === 'live' ? loadLive(opts) : loadHistory(opts);
    }

    const REFRESH_MS = 15000;
    let refreshTimer = null;
    function shouldAutoRefresh() {
      if (document.hidden) return false;
      if (viewMode === 'live') return true;
      // History mode: auto-refresh only when viewing today.
      return mode === 'day' && currentDay === todayInET();
    }
    function tickRefresh() {
      if (shouldAutoRefresh()) load({ fit: false });
    }
    function startAutoRefresh() {
      stopAutoRefresh();
      refreshTimer = setInterval(tickRefresh, REFRESH_MS);
    }
    function stopAutoRefresh() {
      if (refreshTimer !== null) {
        clearInterval(refreshTimer);
        refreshTimer = null;
      }
    }

    function setViewMode(next) {
      if (next === viewMode) return;
      viewMode = next;
      controlsEl.classList.toggle('live', next === 'live');
      tabHistoryBtn.classList.toggle('active', next === 'history');
      tabLiveBtn.classList.toggle('active', next === 'live');
      load();
    }

    prevBtn.addEventListener('click', () => {
      if (mode !== 'day') return;
      setDay(shiftDate(currentDay, -1));
      load();
    });
    nextBtn.addEventListener('click', () => {
      if (mode !== 'day') return;
      setDay(shiftDate(currentDay, 1));
      load();
    });
    function toggleCustomMode() {
      if (mode === 'day') {
        fromEl.value = `${currentDay}T00:00`;
        toEl.value = `${currentDay}T23:59`;
        setCustom();
      } else {
        setDay(currentDay || todayInET());
      }
      load();
    }
    toggleBtn.addEventListener('click', toggleCustomMode);
    dayLabelEl.addEventListener('click', toggleCustomMode);
    document.getElementById('applyCustom').addEventListener('click', () => {
      if (mode !== 'custom') setCustom();
      load();
    });
    tabHistoryBtn.addEventListener('click', () => setViewMode('history'));
    tabLiveBtn.addEventListener('click', () => setViewMode('live'));
    refreshLiveBtn.addEventListener('click', () => loadLive());

    let pageLoadDay = todayInET();
    function checkDateRollover() {
      const today = todayInET();
      if (today === pageLoadDay) return;
      // ET date has rolled over since the page loaded.
      if (viewMode === 'history' && mode === 'day' && currentDay === pageLoadDay) {
        setDay(today);
        load();
      } else {
        // Re-render the "Today"/"Yesterday" label for whatever day is shown.
        if (viewMode === 'history' && mode === 'day') {
          dayLabelEl.textContent = dayLabelText(currentDay);
        }
      }
      pageLoadDay = today;
    }
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) {
        checkDateRollover();
        tickRefresh();
      }
    });
    window.addEventListener('focus', () => {
      checkDateRollover();
      tickRefresh();
    });
    setInterval(checkDateRollover, 60000);

    setDay(pageLoadDay);
    tabHistoryBtn.classList.add('active');
    load();
    startAutoRefresh();
  </script>
</body>
</html>
